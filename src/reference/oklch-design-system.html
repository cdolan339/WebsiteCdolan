<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKLCH Design System Reference</title>
<style>
/* Allow animating custom CSS properties */
@property --hue {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  /* --- 1. HUE TOKENS (H) --- */
  --h-brand:   292.1; /* Purple */
  --h-error:    17.0; /* Red */
  --h-warning:  73.1; /* Yellow */
  --h-success: 164.2; /* Green */
  --h-neutral: 284.1; /* Background & Text */
  --h-cursor:  162.7; /* Cursor / Focus */
  --h-dark:     89.9; /* Dark background */
  --h-white:       0; /* Light background */

  /* --- 2. LIGHTNESS TOKENS (L) --- */
  --l-background: 96%;
  --l-surface:    92%;
  --l-action:     55%;
  --l-text:       15%;
  --l-shadow:     10%;
  --l-selected:   45%;
  --l-dark:        0%;
  --l-white:      98%;

  /* --- 3. CHROMA TOKENS (C) --- */
  --c-neon:  0.26;
  --c-soft:  0.05;
  --c-bg:    0.01;
  --c-dark:  0.01;
  --c-white: 0.01;

  /* --- 4. ASSEMBLED DESIGN TOKENS --- */
  --clr-bg:        oklch(var(--l-background) var(--c-bg) var(--h-neutral));
  --clr-text:      oklch(var(--l-text) var(--c-soft) var(--h-neutral));
  --clr-white:     oklch(var(--l-white) var(--c-white) var(--h-white));
  --clr-dark:      oklch(var(--l-dark) var(--c-bg) var(--h-dark));
  --clr-purple:    oklch(var(--l-action) var(--c-neon) var(--h-brand));
  --clr-red:       oklch(var(--l-action) var(--c-neon) var(--h-error));
  --clr-cursor:    oklch(67% 0.16 var(--h-cursor));
  --clr-shadow:    oklch(var(--l-shadow) 0.1 var(--h-brand) / 0.1);
  --clr-btn-text:  var(--clr-white);
}

@media (prefers-color-scheme: dark) {
  :root {
    --l-background:  8%;
    --l-surface:    14%;
    --l-action:     65%;
    --l-text:       92%;
    --l-selected:   75%;
    --clr-btn-text: oklch(10% 0.02 var(--h-neutral));
  }
}

/* BASE STYLES */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--clr-bg);
  color: var(--clr-text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  line-height: 1.6;
  padding: 2rem 1rem;
  transition: all 0.3s ease;
}

.container { max-width: 1000px; margin: 0 auto; }
header { text-align: center; margin-bottom: 4rem; }
header h1 { font-size: 3.5rem; text-transform: uppercase; font-style: italic; font-weight: 900; }
header p { font-size: 1.25rem; opacity: 0.6; }
section { margin-bottom: 5rem; }

/* CARD - adapts to --hue */
.card {
  --hue: var(--h-brand);
  --accent: oklch(var(--l-action) var(--c-neon) var(--hue));
  background-color: oklch(var(--l-surface) 0.04 var(--hue));
  border: 4px solid var(--accent);
  border-radius: 1.5rem;
  padding: 2.5rem;
  margin-bottom: 2rem;
  box-shadow: 0 20px 40px -15px oklch(var(--l-shadow) 0.1 var(--hue) / 0.1);
  transition: all 0.3s ease;
}

.card h2 { color: var(--accent); text-transform: uppercase; font-style: italic; font-weight: 900; margin-bottom: 0.5rem; }

button {
  background: var(--accent);
  color: var(--clr-btn-text);
  padding: 0.8rem 2rem;
  border-radius: 1rem;
  font-weight: 800;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s ease;
}

button:hover { background: oklch(calc(var(--l-action) - 10%) var(--c-neon) var(--hue)); }
button:active { transform: scale(0.96); }
button[aria-selected="true"] { background: oklch(var(--l-selected) var(--c-neon) var(--hue)); outline: 3px solid var(--clr-cursor); outline-offset: 3px; }

.flex { display: flex; gap: 1rem; flex-wrap: wrap; }

/* DOCUMENTATION SECTIONS */
.doc-section { background: var(--clr-white); color: var(--clr-dark); padding: 2.5rem; border-radius: 2rem; border: 1px solid #ddd; }
.doc-section h2 { font-size: 2rem; margin-bottom: 1.5rem; text-decoration: underline; }
.dev-code { background-color: var(--clr-dark); color: var(--clr-white); padding: 1.5rem; border-radius: 1rem; font-family: monospace; font-size: 0.9rem; margin: 1rem 0; white-space: pre-wrap; }

/* SPECIAL EFFECTS */
.glass-card { background: oklch(var(--l-surface) 0.1 var(--hue) / 0.3); backdrop-filter: blur(12px); border: 1px solid oklch(var(--l-action) var(--c-neon) var(--hue) / 0.4); }
.neon-glow { box-shadow: 0 0 20px color-mix(in oklch, var(--accent), white 40%); }

/* ANIMATION */
@keyframes rainbow-hue { from { --hue: 0; } to { --hue: 360; } }
.animate-hue { animation: rainbow-hue 50s linear infinite; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1 style="color: var(--clr-purple)">Cyberpunk <span style="opacity: 0.3">OKLCH</span></h1>
      <p>OKLCH Color System Reference</p>
    </header>

    <section>
      <div class="card" style="--hue: var(--h-brand)">
        <h2>Brand (Purple)</h2>
        <div class="flex">
          <button>Normal</button>
          <button aria-selected="true">Selected</button>
        </div>
      </div>
    </section>

    <section>
      <div class="card" style="--hue: var(--h-error)">
        <h2>Error (Red)</h2>
        <div class="flex">
          <button>Normal</button>
          <button aria-selected="true">Selected</button>
        </div>
      </div>
    </section>

    <section>
      <div class="card" style="--hue: var(--h-success)">
        <h2>Success (Green)</h2>
        <div class="flex">
          <button>Normal</button>
          <button aria-selected="true">Selected</button>
        </div>
      </div>
    </section>

    <section>
      <div class="card" style="--hue: var(--h-warning)">
        <h2>Warning (Yellow)</h2>
        <div class="flex">
          <button>Normal</button>
          <button aria-selected="true">Selected</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
